language: java

jdk:
- openjdk11

services:
  - docker

before_release:
  - ./generate-executable.sh

release:
  api_key: $GITHUB_OAUTH_TOKEN
  file: "./pullpitoK"
  provider: releases
  skip_cleanup: true
  draft: true
  on:
    repo: nicokosi/pullpitoK

branches:
  only:
  - master
  - /^release-.*$/
